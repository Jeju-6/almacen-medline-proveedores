<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión - Almacén Medline</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #0b4f6c 0%, #1a7a9e 100%);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .login-card {
      background: #fff; border-radius: 16px; padding: 40px;
      width: 100%; max-width: 400px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    }
    .login-logo { text-align: center; margin-bottom: 28px; }
    .login-logo i { font-size: 48px; color: #0b4f6c; }
    .login-logo h4 { color: #0b4f6c; font-weight: 700; margin-top: 8px; }
    .login-logo p { color: #888; font-size: 13px; margin: 0; }
    .form-control:focus { border-color: #0b4f6c; box-shadow: 0 0 0 3px rgba(11,79,108,0.15); }
    .btn-login {
      background-color: #0b4f6c; color: #fff; width: 100%;
      padding: 12px; font-size: 16px; font-weight: 600; border: none; border-radius: 8px;
    }
    .btn-login:hover { background-color: #1a7a9e; color: #fff; }
    .btn-kiosco {
      width: 100%; padding: 10px; font-size: 14px;
      border: 2px solid #0b4f6c; color: #0b4f6c; border-radius: 8px;
      background: transparent; margin-top: 10px;
    }
    .btn-kiosco:hover { background-color: #f0f8fc; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">
      <i class="bi bi-box-seam"></i>
      <h4>Almacén Medline</h4>
      <p>Control de inventario de proveedores</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ 'danger' if category == 'error' else 'success' }} py-2" style="font-size:13px;">
            {{ message }}
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST">
      <div class="mb-3">
        <label class="form-label fw-semibold">Usuario</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input type="text" name="username" class="form-control" placeholder="Tu usuario" required autofocus>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">Contraseña</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" name="password" class="form-control" placeholder="Tu contraseña" required>
        </div>
      </div>
      <button type="submit" class="btn-login">
        <i class="bi bi-box-arrow-in-right"></i> Iniciar sesión
      </button>
    </form>

    <hr style="margin: 20px 0; color: #ddd;">
    <div style="text-align:center; font-size:12px; color:#aaa; margin-bottom:10px;">
      ¿Estás en el equipo del almacén?
    </div>
    <a href="/kiosco" class="btn-kiosco d-block text-center text-decoration-none">
      <i class="bi bi-qr-code-scan"></i> Entrar en modo kiosco
    </a>
  </div>
</body>
</html>

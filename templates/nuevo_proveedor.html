{% extends "base.html" %}
{% block title %}Nuevo Proveedor - Almacén Medline{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <h4 style="color:#0b4f6c; font-weight:700; margin:0;">
    <i class="bi bi-plus-circle"></i> Nuevo proveedor
  </h4>
  <a href="{{ url_for('proveedores') }}" class="btn btn-sm btn-outline-secondary">
    <i class="bi bi-arrow-left"></i> Regresar
  </a>
</div>

<div class="card">
  <div class="card-body p-4">
    <form method="POST">
      <div class="row g-3">

        <div class="col-md-6">
          <label class="form-label fw-semibold">Nombre del proveedor <span class="text-danger">*</span></label>
          <input type="text" name="nombre" class="form-control" required
            placeholder="Ej: Proveedor ABC">
        </div>

        <div class="col-md-6">
          <label class="form-label fw-semibold">Área</label>
          <input type="text" name="area" class="form-control"
            placeholder="Ej: Producción, Mantenimiento...">
        </div>

        <div class="col-md-12">
          <label class="form-label fw-semibold">Contacto</label>
          <input type="text" name="contacto" class="form-control"
            placeholder="Nombre del contacto o teléfono">
        </div>

        <div class="col-12 mt-2">
          <button type="submit" class="btn" style="background:#0b4f6c; color:#fff; padding:10px 28px;">
            <i class="bi bi-save"></i> Guardar proveedor
          </button>
          <a href="{{ url_for('proveedores') }}" class="btn btn-outline-secondary ms-2">
            Cancelar
          </a>
        </div>

      </div>
    </form>
  </div>
</div>
{% endblock %}

{% extends "base.html" %}
{% block title %}Nuevo Usuario - Almacén Medline{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <h4 style="color:#0b4f6c; font-weight:700; margin:0;">
    <i class="bi bi-person-plus"></i> Nuevo usuario
  </h4>
  <a href="{{ url_for('usuarios') }}" class="btn btn-sm btn-outline-secondary">
    <i class="bi bi-arrow-left"></i> Regresar
  </a>
</div>

<div class="card">
  <div class="card-body p-4">
    <form method="POST">
      <div class="row g-3">

        <div class="col-md-6">
          <label class="form-label fw-semibold">Nombre completo <span class="text-danger">*</span></label>
          <input type="text" name="nombre" class="form-control" required placeholder="Ej: Juan Pérez">
        </div>

        <div class="col-md-6">
          <label class="form-label fw-semibold">Nombre de usuario <span class="text-danger">*</span></label>
          <input type="text" name="username" class="form-control" required placeholder="Ej: jperez">
          <div class="form-text">Sin espacios ni caracteres especiales.</div>
        </div>

        <div class="col-md-6">
          <label class="form-label fw-semibold">Contraseña <span class="text-danger">*</span></label>
          <input type="password" name="password" class="form-control" required placeholder="Mínimo 6 caracteres">
        </div>

        <div class="col-md-6">
          <label class="form-label fw-semibold">Rol <span class="text-danger">*</span></label>
          <select name="rol" class="form-select" id="selectRol" onchange="toggleProveedor()">
            <option value="proveedor">Proveedor</option>
            <option value="admin">Administrador</option>
            <option value="kiosco">Kiosco</option>
          </select>
        </div>

        <div class="col-md-12" id="campoProveedor">
          <label class="form-label fw-semibold">Proveedor asignado <span class="text-danger">*</span></label>
          <select name="id_proveedor" class="form-select">
            <option value="">Seleccionar proveedor...</option>
            {% for prov in proveedores %}
            <option value="{{ prov.id_proveedor }}">{{ prov.nombre }}</option>
            {% endfor %}
          </select>
          <div class="form-text">El usuario solo verá los artículos de este proveedor.</div>
        </div>

        <div class="col-12 mt-2">
          <button type="submit" class="btn" style="background:#0b4f6c; color:#fff; padding:10px 28px;">
            <i class="bi bi-save"></i> Crear usuario
          </button>
          <a href="{{ url_for('usuarios') }}" class="btn btn-outline-secondary ms-2">
            Cancelar
          </a>
        </div>

      </div>
    </form>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
  function toggleProveedor() {
    const rol = document.getElementById('selectRol').value;
    const campo = document.getElementById('campoProveedor');
    campo.style.display = (rol === 'admin' || rol === 'kiosco') ? 'none' : 'block';
  }
  toggleProveedor();
</script>
{% endblock %}

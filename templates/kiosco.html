<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kiosco - Almacén Medline</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: #0b4f6c; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .kiosco-card { background: #fff; border-radius: 16px; padding: 24px; width: 100%; max-width: 480px; box-shadow: 0 8px 32px rgba(0,0,0,0.25); }
    .kiosco-header { text-align: center; margin-bottom: 20px; }
    .kiosco-header h4 { color: #0b4f6c; font-weight: 700; margin: 0; }
    .kiosco-header p { color: #888; font-size: 13px; margin: 4px 0 0; }
    #reader { width: 100%; min-height: 250px; border: 2px dashed #0b4f6c; border-radius: 10px; overflow: hidden; background: #f8f9fa; margin-bottom: 12px; }
    .btn-tipo { width: 48%; padding: 14px; font-size: 16px; font-weight: 600; border-radius: 10px; border: 2px solid; cursor: pointer; transition: all 0.2s; }
    .btn-entrada { border-color: #198754; color: #198754; background: #fff; }
    .btn-entrada.activo { background: #198754; color: #fff; }
    .btn-salida { border-color: #dc3545; color: #dc3545; background: #fff; }
    .btn-salida.activo { background: #dc3545; color: #fff; }
    .btn-registrar { width: 100%; padding: 14px; background: #0b4f6c; color: #fff; border: none; border-radius: 10px; font-size: 17px; font-weight: 700; margin-top: 16px; cursor: pointer; }
    .btn-registrar:hover { background: #1a7a9e; }
    .btn-reset { width: 100%; padding: 8px; background: transparent; border: 1px solid #ccc; border-radius: 8px; color: #888; font-size: 13px; margin-top: 8px; cursor: pointer; }
    .status-box { padding: 14px; border-radius: 10px; text-align: center; font-weight: 600; font-size: 15px; margin-top: 16px; display: none; }
    .status-success { background: #d1e7dd; color: #0f5132; }
    .status-error { background: #f8d7da; color: #842029; }
    .articulo-info { background: #f0f8fc; border-radius: 8px; padding: 12px; margin-bottom: 12px; display: none; }
    .form-extra { background: #f8f9fa; border-radius: 10px; padding: 16px; margin-top: 12px; display: none; }
    .campo-label { font-weight: 600; font-size: 14px; margin-bottom: 4px; display: block; color: #333; }
    .campo-input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; margin-bottom: 10px; box-sizing: border-box; }
    .btn-iniciar { width: 100%; padding: 16px; background: #0b4f6c; color: #fff; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; margin-bottom: 8px; }
    .ios-scan-btn { width: 100%; padding: 16px; background: #0b4f6c; color: #fff; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; margin-bottom: 8px; display: block; text-align: center; }
    #iosFileInput { display: none; }
  </style>
</head>
<body>
<div class="kiosco-card">
  <div class="kiosco-header">
    <i class="bi bi-qr-code-scan" style="font-size:36px; color:#0b4f6c;"></i>
    <h4>Modo Kiosco</h4>
    <p>Almacén de proveedores Medline</p>
  </div>

  <!-- Sección Android -->
  <div id="seccionAndroid" style="display:none;">
    <button class="btn-iniciar" onclick="iniciarCamaraAndroid()">
      <i class="bi bi-camera"></i> Abrir cámara para escanear
    </button>
    <div id="reader"></div>
    <button class="btn-reset" id="btnReset" style="display:none;" onclick="reiniciarLector()">
      <i class="bi bi-arrow-clockwise"></i> Escanear otro artículo
    </button>
  </div>

  <!-- Sección iOS -->
  <div id="seccionIOS" style="display:none;">
    <div style="margin-bottom:16px;">
      <label style="width:100%; padding:16px; background:#0b4f6c; color:#fff; border-radius:10px;
                    font-size:16px; font-weight:600; cursor:pointer; display:block; text-align:center;">
        <i class="bi bi-camera"></i> Abrir cámara y escanear QR
        <input type="file" id="iosKioscoInput" accept="image/*" capture="environment"
               style="display:none;" onchange="procesarIOSKiosco(this)">
      </label>
      <div id="iosKioscoStatus" style="text-align:center; font-size:12px; color:#888; margin-top:8px;"></div>
      <div id="iosKioscoReader" style="display:none;"></div>
    </div>
    <div style="font-size:13px; color:#888; margin-bottom:8px; font-weight:600; text-align:center;">
      — o ingresa el número de parte —
    </div>
    <div style="display:flex; gap:8px;">
      <input type="text" id="iosManualCodigo" class="campo-input"
             placeholder="Ej: 5250" style="margin-bottom:0; flex:1;"
             onkeypress="if(event.key==='Enter') buscarManualIOS()">
      <button onclick="buscarManualIOS()"
              style="padding:10px 16px; background:#0b4f6c; color:#fff; border:none; border-radius:8px; font-weight:600; cursor:pointer;">
        Buscar
      </button>
    </div>
  </div>

  <div class="articulo-info" id="articuloInfo">
    <div style="font-size:13px; color:#888;">Artículo detectado:</div>
    <div id="articuloNombre" style="font-weight:700; color:#0b4f6c; font-size:16px;"></div>
    <div id="articuloStock" style="font-size:13px; color:#555;"></div>
    <div id="articuloUbicacion" style="font-size:12px; color:#888; margin-top:4px;"></div>
  </div>

  <div class="d-flex justify-content-between gap-2 mb-3 mt-3">
      <button class="btn-tipo btn-salida activo" id="btnSalida" onclick="seleccionarTipo('SALIDA')"
              style="width:100%;">
        <i class="bi bi-box-arrow-up"></i> SALIDA
      </button>
    </div>

  <div>
    <label class="campo-label">Cantidad:</label>
    <input type="number" id="cantidad" value="1" min="1" class="campo-input">
  </div>

  <div class="form-extra" id="formExtra">
    <div style="font-weight:600; color:#0b4f6c; margin-bottom:10px; font-size:14px;">
      <i class="bi bi-person-lines-fill"></i> Datos del movimiento
    </div>
    <label class="campo-label">Nombre de quien retira: <span style="color:red;">*</span></label>
    <input type="text" id="nombreRetira" class="campo-input" placeholder="Nombre completo">
    <label class="campo-label">Área / Departamento:</label>
    <input type="text" id="areaRetira" class="campo-input" placeholder="Ej: Mantenimiento, Producción...">
    <label class="campo-label">Motivo / Uso:</label>
    <input type="text" id="motivoRetira" class="campo-input" placeholder="Ej: Reparación de equipo...">
    <label class="campo-label">Observaciones adicionales:</label>
    <input type="text" id="observaciones" class="campo-input" placeholder="Opcional">
  </div>

  <button class="btn-registrar" onclick="registrar()">
    <i class="bi bi-check-circle"></i> Registrar operación
  </button>

  <div class="status-box" id="statusBox"></div>

  <div style="display:flex; justify-content:center; gap:12px; margin-top:20px; flex-wrap:wrap;">
    <a href="/login" style="font-size:13px; color:#fff; text-decoration:none; background:#1a7a9e;
                            padding:8px 16px; border-radius:8px;">
      <i class="bi bi-box-arrow-in-right"></i> Iniciar sesión
    </a>
    <a href="/dashboard" style="font-size:13px; color:#fff; text-decoration:none; background:#1a7a9e;
                                padding:8px 16px; border-radius:8px;">
      <i class="bi bi-speedometer2"></i> Dashboard
    </a>
  </div>
</div>

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script>
  let codigoDetectado = '';
  let stockActual = 0;
  let tipoSeleccionado = 'SALIDA';
  let html5QrCode = null;
  let camaraActiva = false;
  const esIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;

  // Detectar iOS y mostrar sección correcta
  document.addEventListener('DOMContentLoaded', function() {
    if (esIOS) {
      document.getElementById('seccionIOS').style.display = 'block';
    } else {
      document.getElementById('seccionAndroid').style.display = 'block';
    }
  });

  // ─── ANDROID ──────────────────────────────────────────────────────────────
  function iniciarCamaraAndroid() {
    document.querySelector('#seccionAndroid .btn-iniciar').style.display = 'none';
    document.getElementById('btnReset').style.display = 'block';
    html5QrCode = new Html5Qrcode("reader");
    Html5Qrcode.getCameras().then(cameras => {
      if (cameras && cameras.length > 0) {
        let camaraId = cameras[cameras.length - 1].id;
        for (let cam of cameras) {
          if (cam.label.toLowerCase().includes('back') ||
              cam.label.toLowerCase().includes('trasera') ||
              cam.label.toLowerCase().includes('rear') ||
              cam.label.toLowerCase().includes('environment')) {
            camaraId = cam.id;
            break;
          }
        }
        html5QrCode.start(
          camaraId,
          { fps: 15, qrbox: { width: 250, height: 250 } },
          onScanSuccess,
          () => {}
        ).then(() => { camaraActiva = true; })
        .catch(err => mostrarStatus('Error al iniciar cámara: ' + err, 'error'));
      }
    }).catch(() => mostrarStatus('Error al acceder a la cámara.', 'error'));
  }

  // ─── iOS ──────────────────────────────────────────────────────────────────
  function procesarImagenIOS(input) {
    if (!input.files || !input.files[0]) return;
    const file = input.files[0];
    document.getElementById('iosStatus').textContent = 'Procesando imagen...';
    const html5QrCodeIOS = new Html5Qrcode("readerIOS");
    html5QrCodeIOS.scanFile(file, true)
      .then(decodedText => {
        document.getElementById('iosStatus').textContent = '';
        onScanSuccess(decodedText);
        input.value = '';
      })
      .catch(() => {
        document.getElementById('iosStatus').textContent = 'No se pudo leer el QR. Intenta de nuevo.';
        input.value = '';
      });
  }

  function buscarManualIOS() {
    const codigo = document.getElementById('iosManualCodigo').value.trim();
    if (!codigo) {
      mostrarStatus('Ingresa un número de parte.', 'error');
      return;
    }
    window.location.href = '/scan/' + encodeURIComponent(codigo);
  }

function procesarIOSKiosco(input) {
    if (!input.files || !input.files[0]) return;
    document.getElementById('iosKioscoStatus').textContent = 'Procesando...';
    const file = input.files[0];

    function escanear() {
      const readerDiv = document.getElementById('iosKioscoReader');
      readerDiv.style.display = 'block';
      const scanner = new Html5Qrcode("iosKioscoReader");
      scanner.scanFile(file, true)
        .then(decodedText => {
          document.getElementById('iosKioscoStatus').textContent = '✅ QR detectado';
          readerDiv.style.display = 'none';
          input.value = '';
          let codigo = decodedText;
          if (decodedText.includes('/scan/')) {
            codigo = decodedText.split('/scan/').pop();
          }
          window.location.replace('/scan/' + encodeURIComponent(codigo));
        })
        .catch(() => {
          document.getElementById('iosKioscoStatus').textContent = 'No se pudo leer. Intenta con mejor iluminación.';
          readerDiv.style.display = 'none';
          input.value = '';
        });
    }

    if (typeof Html5Qrcode === 'undefined') {
      const script = document.createElement('script');
      script.src = 'https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js';
      script.onload = escanear;
      document.head.appendChild(script);
    } else {
      escanear();
    }
  }

  function buscarManualIOS() {
    const codigo = document.getElementById('iosManualCodigo').value.trim();
    if (codigo) window.location.replace('/scan/' + encodeURIComponent(codigo));
  }

  // ─── COMÚN ────────────────────────────────────────────────────────────────
  function onScanSuccess(decodedText) {
    if (codigoDetectado === decodedText) return;
    // Extraer solo el código si viene como URL completa
    let codigo = decodedText;
    if (decodedText.includes('/scan/')) {
      codigo = decodedText.split('/scan/').pop();
    }
    codigoDetectado = codigo;
    if (navigator.vibrate) navigator.vibrate(150);
    // Redirigir directo al formulario
    window.location.replace('/scan/' + encodeURIComponent(codigo));
  }

  function buscarArticulo(codigo) {
    fetch('/api/articulo/' + encodeURIComponent(codigo))
      .then(r => r.json())
      .then(data => {
        if (data.found) {
          stockActual = data.stock_actual;
          document.getElementById('articuloNombre').textContent = data.nombre;
          document.getElementById('articuloStock').textContent = 'Stock actual: ' + data.stock_actual + ' ' + data.unidad_medida;
          if (data.ubicacion) {
            document.getElementById('articuloUbicacion').textContent = '📍 ' + data.ubicacion;
          }
          document.getElementById('articuloInfo').style.display = 'block';
          document.getElementById('formExtra').style.display = 'block';
          document.getElementById('nombreRetira').focus();
        } else {
          document.getElementById('articuloInfo').style.display = 'none';
          document.getElementById('formExtra').style.display = 'none';
          mostrarStatus('Artículo no encontrado en el sistema.', 'error');
        }
      });
  }

  function reiniciarLector() {
    codigoDetectado = '';
    stockActual = 0;
    document.getElementById('articuloInfo').style.display = 'none';
    document.getElementById('formExtra').style.display = 'none';
    document.getElementById('statusBox').style.display = 'none';
    document.getElementById('cantidad').value = '1';
    document.getElementById('nombreRetira').value = '';
    document.getElementById('areaRetira').value = '';
    document.getElementById('motivoRetira').value = '';
    document.getElementById('observaciones').value = '';

    if (!esIOS && html5QrCode && camaraActiva) {
      html5QrCode.stop().then(() => {
        camaraActiva = false;
        document.querySelector('#seccionAndroid .btn-iniciar').style.display = 'block';
        document.getElementById('btnReset').style.display = 'none';
      }).catch(() => {});
    }
  }

  function seleccionarTipo(tipo) {
    tipoSeleccionado = tipo;
    document.getElementById('btnEntrada').classList.toggle('activo', tipo === 'ENTRADA');
    document.getElementById('btnSalida').classList.toggle('activo', tipo === 'SALIDA');
  }

  function registrar() {
    if (!codigoDetectado) {
      mostrarStatus('Por favor escanea un código QR primero.', 'error');
      return;
    }
    const cantidad = parseInt(document.getElementById('cantidad').value);
    if (!cantidad || cantidad < 1) {
      mostrarStatus('La cantidad debe ser mayor a 0.', 'error');
      return;
    }
    const nombreRetira = document.getElementById('nombreRetira').value.trim();
    if (!nombreRetira) {
      mostrarStatus('Por favor ingresa el nombre de quien retira.', 'error');
      document.getElementById('nombreRetira').focus();
      return;
    }
    if (tipoSeleccionado === 'SALIDA' && stockActual > 0) {
      const porcentaje = (cantidad / stockActual) * 100;
      if (porcentaje >= 50) {
        const confirmar = confirm(`⚠️ Estás sacando ${cantidad} de ${stockActual} unidades (${Math.round(porcentaje)}% del stock).\n\n¿Confirmas esta salida?`);
        if (!confirmar) return;
      }
    }
    const areaRetira = document.getElementById('areaRetira').value.trim();
    const motivoRetira = document.getElementById('motivoRetira').value.trim();
    const obsExtra = document.getElementById('observaciones').value.trim();
    const observacionesCompletas = [
      `Retira: ${nombreRetira}`,
      areaRetira ? `Área: ${areaRetira}` : '',
      motivoRetira ? `Motivo: ${motivoRetira}` : '',
      obsExtra ? obsExtra : ''
    ].filter(Boolean).join(' | ');

    fetch('/registrar_movimiento', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        codigo_qr: codigoDetectado,
        tipo: tipoSeleccionado,
        cantidad: cantidad,
        observaciones: observacionesCompletas,
        modo_kiosco: 1
      })
    })
    .then(r => r.json())
    .then(data => {
      mostrarStatus(data.message, data.status);
      if (data.status === 'success') setTimeout(() => reiniciarLector(), 2500);
    });
  }

  function mostrarStatus(msg, tipo) {
    const box = document.getElementById('statusBox');
    box.textContent = msg;
    box.className = 'status-box status-' + tipo;
    box.style.display = 'block';
  }
</script>
</body>
</html>

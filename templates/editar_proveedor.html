{% extends "base.html" %}
{% block title %}Editar Proveedor - Almacén Medline{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <h4 style="color:#0b4f6c; font-weight:700; margin:0;">
    <i class="bi bi-pencil-square"></i> Editar proveedor
  </h4>
  <a href="{{ url_for('proveedores') }}" class="btn btn-sm btn-outline-secondary">
    <i class="bi bi-arrow-left"></i> Regresar
  </a>
</div>

<div class="card">
  <div class="card-body p-4">
    <form method="POST" enctype="multipart/form-data">
      <div class="row g-3">

        <div class="col-md-6">
          <label class="form-label fw-semibold">Nombre del proveedor <span class="text-danger">*</span></label>
          <input type="text" name="nombre" class="form-control" required value="{{ proveedor.nombre }}">
        </div>

        <div class="col-md-6">
          <label class="form-label fw-semibold">Área</label>
          <input type="text" name="area" class="form-control" value="{{ proveedor.area or '' }}">
        </div>

        <div class="col-md-12">
          <label class="form-label fw-semibold">Contacto</label>
          <input type="text" name="contacto" class="form-control" value="{{ proveedor.contacto or '' }}">
        </div>

        <div class="col-md-12">
          <label class="form-label fw-semibold">Logo del proveedor</label>
          {% if proveedor.logo %}
          <div class="mb-2">
            <img src="{{ url_for('static', filename='uploads/' + proveedor.logo) }}"
                 style="height:60px; border-radius:8px; border:1px solid #eee; padding:4px;">
            <span style="font-size:12px; color:#888; margin-left:8px;">Logo actual</span>
          </div>
          {% endif %}
          <input type="file" name="logo" class="form-control" accept="image/*">
          <div class="form-text">Sube un nuevo logo para reemplazar el actual. Formatos: JPG, PNG, WEBP.</div>
        </div>

        <div class="col-12 mt-2">
          <button type="submit" class="btn" style="background:#0b4f6c; color:#fff; padding:10px 28px;">
            <i class="bi bi-save"></i> Guardar cambios
          </button>
          <a href="{{ url_for('proveedores') }}" class="btn btn-outline-secondary ms-2">
            Cancelar
          </a>
        </div>

      </div>
    </form>
  </div>
</div>
{% endblock %}
